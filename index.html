<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LeetCode Hot 100 极简题解</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <p class="eyebrow">Static Browser</p>
        <h1>Hot 100</h1>
        <p class="subtitle">Python / C++ / 中文说明</p>
      </div>

      <label class="search">
        <span>搜索题目</span>
        <input id="searchInput" type="search" placeholder="输入题号或关键词" />
      </label>

      <div class="meta">
        <button id="toggleAllBtn" type="button">展开全部分组</button>
        <span id="countText">加载中...</span>
      </div>

      <nav id="nav" class="nav"></nav>
    </aside>

    <main class="main">
      <header class="hero">
        <div>
          <p class="eyebrow">LeetCode 热题 100</p>
          <h2>极简题解浏览页</h2>
          <p id="heroText" class="hero-text">加载中...</p>
        </div>
        <div class="hero-card">
          <p>说明</p>
          <ul>
            <li>页面读取本地 Markdown 文件。</li>
            <li>每题保留最小 Python / C++ 解法。</li>
            <li>点击左侧题目即可跳转。</li>
          </ul>
        </div>
      </header>

      <section id="content" class="content">
        <div class="loading">正在加载文档...</div>
      </section>
    </main>
  </div>

  <button id="backToTopBtn" class="back-to-top" type="button" aria-label="返回顶部">Top</button>

  <script src="./app.js"></script>
</body>
</html>
